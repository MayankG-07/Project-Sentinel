services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: sentinel-backend
    ports:
      - "8000:8000"
    volumes:
      - ./chroma_db:/app/chroma_db
      - ./db_data:/app/db_data
      - ./Data:/app/Data
      # Shared volume for rendered page images
      - ./client/public/rendered_pages:/app/client/public/rendered_pages
    env_file:
      - .env
    command: uvicorn server:app --host 0.0.0.0 --port 8000
    extra_hosts:
      - "host.docker.internal:host-gateway"
    dns:
      - 8.8.8.8

  frontend:
    build:
      context: ./client
      dockerfile: Dockerfile.frontend
      args:
        VITE_API_URL: ${VITE_API_URL:-/api}
    container_name: sentinel-frontend
    ports:
      - "8080:80"
    depends_on:
      - backend
    # Mount the shared volume for serving the images
    volumes:
      - ./client/public/rendered_pages:/usr/share/nginx/html/rendered_pages

networks:
  default:
    name: sentinel-network
